<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>krisby.dev</title>

  <style>
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      text-align: center;
      padding: 40px;
      border: 1px solid #30363d;
      border-radius: 12px;
      background: #161b22;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 42px;
    }

    p {
      color: #8b949e;
      font-size: 18px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 25px;
    }

    li {
      margin: 10px 0;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Andreas Krisby</h1>
    <p>IAM • Cloud • Security</p>

    <ul>
      <li>Entra ID</li>
      <li>PIM</li>
      <li>Conditional Access</li>
      <li>KQL</li>
      <li>FIDO2</li>

</html>
